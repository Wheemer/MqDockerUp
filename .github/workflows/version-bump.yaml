name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, for example 1.23.9-wheemer.4"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Open version bump PR
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate requested version
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if ! printf '%s' "${version}" | grep -Eq '^[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$'; then
            echo "::error::Version must look like 1.2.3 or 1.2.3-wheemer.4"
            exit 1
          fi

      - name: Update package version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Run typecheck and tests
        run: npm run ci

      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ci/version-${{ inputs.version }}
          commit-message: Bump version to v${{ inputs.version }}
          title: Bump version to v${{ inputs.version }}
          body: |
            Automated version bump for the Wheemer-maintained release line.

            After this merges, create tag `v${{ inputs.version }}` to publish the GitHub release and GHCR image.
