name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or republish, for example v1.23.9-wheemer.4"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/wheemer/mqdockerup

jobs:
  validate:
    name: TypeScript and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck and tests
        run: npm run ci

  release:
    name: GitHub release and GHCR image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "${tag}" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tags must look like v1.2.3 or v1.2.3-wheemer.4"
            exit 1
          fi

          version="${tag#v}"
          major_minor_patch="$(printf '%s' "${version}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')"
          major_minor="$(printf '%s' "${major_minor_patch}" | cut -d. -f1,2)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"

      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Ensure manual tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if ! git rev-parse "${tag}" >/dev/null 2>&1; then
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "${tag}"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major_minor }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push GHCR image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "${notes_file}"

          {
            cat "${notes_file}"
            echo
            echo "### Container image"
            echo
            echo "- \`${GHCR_IMAGE}:${TAG_NAME}\`"
            echo "- \`${GHCR_IMAGE}:latest\`"
          } > release-notes.md

          prerelease_flag=""
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md \
              ${prerelease_flag}
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              ${prerelease_flag}
          fi
