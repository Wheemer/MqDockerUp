name: Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run ci
        env:
          CI: true
      - name: Build Docker image
        run: docker build -t mqdockerup:test .
