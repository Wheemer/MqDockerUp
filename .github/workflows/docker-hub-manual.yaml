name: Docker Hub Manual Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker Hub tag to publish, for example v1.23.9-wheemer.4"
        required: true
        type: string
      latest:
        description: "Also publish wheemer/mqdockerup:latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: wheemer/mqdockerup

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Validate Docker Hub secrets
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_HUB_USERNAME}" ] || [ -z "${DOCKER_HUB_PASSWORD}" ]; then
            echo "::error::Set DOCKER_HUB_USERNAME and DOCKER_HUB_PASSWORD repository secrets before publishing to Docker Hub."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}
            type=sha,prefix=sha-

      - name: Build and push Docker Hub image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

